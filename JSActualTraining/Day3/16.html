<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day3 JS 16</title>
</head>
<body>
    <h1>
        Make the string in reverse order. (input box)
        (Eg. We will win the world cup.)
        Reverse1 : .puc dlrow eht niw lliw ew
        Reverse2 : cup. World the win will We
    </h1>
    <button onclick="func()">Click</button>
    <p id="original"></p>
    <p id="result1"></p>
    <p id="result2"></p>

    <script>
        function reverseCharacters(str) {
            return str.split('').reverse().join('');
        }
        function reverseWords(str) {
            return str.split(' ').reverse().join(' ');
        }
        function func() {
            const sentence = "We will win the world cup.";
            const charReversed = reverseCharacters(sentence);
            const wordReversed = reverseWords(sentence);

            document.getElementById('original').innerHTML = `Original : ${sentence}`;
            document.getElementById('result1').innerHTML = `Reverse 1 : ${charReversed}`;
            document.getElementById('result2').innerHTML = `Reverse 2 : ${wordReversed}`;
        }
    </script>
</body>
</html>
