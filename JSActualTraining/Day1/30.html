
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 30</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .div-table { display: table; width: 100%; border-collapse: collapse; }
        .div-table-row { display: table-row; }
        .div-table-cell { display: table-cell; padding: 8px; border: 1px solid #ccc; }
        .div-table-header { font-weight: bold; background: #eee; }
        .odd { background-color: #f0f8ff; }
        .even { background-color: #f5f5dc; }
        .div_over { background-color: #ffeb3b !important; }
    </style>
</head>
<body class="container-sm">
    <h1>
        JS Question 30 > 
        Make one html with div and give odd color even color class and on mouse over change the class of div to third class div_over.<br>
        Note: Make all this in div!
	</h1>
    <div class="div-table">
        <!-- Table Header -->
        <div class="div-table-row div-table-header">
            <div class="div-table-cell">#</div>
            <div class="div-table-cell">Firstname</div>
            <div class="div-table-cell">Lastname</div>
            <div class="div-table-cell">Email</div>
        </div>
        
        <!-- Table Row 1 -->
        <div class="div-table-row">
            <div class="div-table-cell">1</div>
            <div class="div-table-cell">John</div>
            <div class="div-table-cell">Doe</div>
            <div class="div-table-cell">john@example.com</div>
        </div>
        
        <!-- Table Row 2 -->
        <div class="div-table-row">
            <div class="div-table-cell">2</div>
            <div class="div-table-cell">Mary</div>
            <div class="div-table-cell">Moe</div>
            <div class="div-table-cell">mary@example.com</div>
        </div>
    </div>

<script>
    // assign odd/even classes and handle hover
    document.addEventListener('DOMContentLoaded', () => {
        const rows = document.querySelectorAll('.div-table-row:not(.div-table-header)');
        rows.forEach((row, idx) => {
            row.classList.add(idx % 2 === 0 ? 'odd' : 'even');
            row.addEventListener('mouseover', () => {
                row.classList.add('div_over');
            });
            row.addEventListener('mouseout', () => {
                row.classList.remove('div_over');
            });
        });
    });
</script>
</body>
</html>
