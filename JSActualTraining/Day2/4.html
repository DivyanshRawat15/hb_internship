
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day2 JS 4</title>
</head>
<body>
    <h1>Console Based Digital Clock</h1>
    <p>
        The Task: Create a simple digital clock that updates the time in the console using the setTimeout function (instead of setInterval).
    </p>
    <p id="result">  </p>
<script>
    function logTime() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        console.clear();
        console.log(`Current time: ${hh}:${mm}:${ss}`);
        setTimeout(logTime, 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        logTime();
    });
</script>
</body>
</html>
