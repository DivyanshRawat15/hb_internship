<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container form-container">
        <header>
            <h1>Add New Product</h1>
            <a href="/" class="btn">Back to List</a>
        </header>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <form id="addProductForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="productName">Product Name *</label>
                <input type="text" id="productName" name="productName" required>
            </div>

            <div class="form-group">
                <label for="productSKU">Product SKU * (Unique)</label>
                <input type="text" id="productSKU" name="productSKU" required>
            </div>

            <div class="form-group">
                <label for="manufacturer">Manufacturer *</label>
                <input type="text" id="manufacturer" name="manufacturer" required>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <input type="text" id="category" name="category" required>
            </div>

            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" name="status" required>
                    <option value="">Select Status...</option>
                    <option value="In Stock">In Stock</option>
                    <option value="Discontinued">Discontinued</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price *</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label for="productImage">Product Image * (JPG/PNG, Max 2MB)</label>
                <input type="file" id="productImage" name="productImage" accept=".jpg, .jpeg, .png" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Add Product</button>
        </form>
    </div>

    <script src="js/add.js"></script>
</body>
</html>
